<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VeriPass 과징금 조회</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <img class="logo-img" src="images/veripass-logo.png" alt="VeriPass" />
      <div>
        <p class="title">VeriPass 과징금 조회</p>
        <p class="subtitle">부정승차 적발 건 누적 과징금 산정</p>
      </div>
    </div>
    <div class="header-right">
      <a href="Main.html" class="nav-link">관제 대시보드</a>
      <span class="clock" id="clock"></span>
      <span class="badge badge-blue">
        <svg class="icon" viewBox="0 0 24 24"><path d="M5 12.5a11 11 0 0 1 14 0"/><path d="M8.5 16a6 6 0 0 1 7 0"/><path d="M12 19.5h.01"/></svg>
        RTDB 연결됨
      </span>
    </div>
  </div>

  <!-- 통계 카드 -->
  <div class="stats-grid stats-3">
    <div class="stat stat-warn">
      <p class="stat-label">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 2.5 17.3a1.5 1.5 0 0 0 1.3 2.3h16.4a1.5 1.5 0 0 0 1.3-2.3L13.7 3.9a1.5 1.5 0 0 0-2.6 0Z"/></svg>
        총 적발 건수
      </p>
      <p class="stat-value" id="stat-count">0</p>
    </div>
    <div class="stat stat-amber">
      <p class="stat-label">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
        적발 카드 수
      </p>
      <p class="stat-value" id="stat-cards">0</p>
    </div>
    <div class="stat stat-blue">
      <p class="stat-label">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 6l4 12 5-12 5 12 4-12"/><path d="M2 11h20"/><path d="M2 15h20"/></svg>
        누적 과징금 총액
      </p>
      <p class="stat-value" id="stat-total-fine">0원</p>
    </div>
  </div>

  <!-- 카드별 누적 과징금 -->
  <div class="card" style="margin-bottom: 14px;">
    <div class="card-head">
      <p class="card-title">카드별 누적 과징금</p>
      <span class="card-meta" id="card-summary-meta"></span>
    </div>
    <div class="history-wrap">
      <table class="history">
        <thead>
          <tr>
            <th>이름</th>
            <th>카드 ID</th>
            <th>카드 유형</th>
            <th style="text-align: right;">적발 건수</th>
            <th style="text-align: right;">누적 과징금</th>
          </tr>
        </thead>
        <tbody id="card-summary-body"></tbody>
      </table>
      <p id="card-summary-empty" class="history-empty" style="display: none;">아직 적발 이력이 없습니다</p>
    </div>
  </div>

  <!-- 적발 이력 상세 + 필터 -->
  <div class="card">
    <div class="card-head">
      <p class="card-title">적발 이력 상세</p>
      <div class="filters">
        <select class="kr-select" id="filter-gate">
          <option value="all">전체 게이트</option>
        </select>
        <select class="kr-select" id="filter-card-id">
          <option value="all">전체 카드 ID</option>
        </select>
        <select class="kr-select" id="filter-card-type">
          <option value="all">전체 유형</option>
          <option value="adult">일반</option>
          <option value="senior">경로우대</option>
          <option value="teen">청소년</option>
        </select>
      </div>
    </div>
    <div class="history-wrap">
      <table class="history">
        <thead>
          <tr>
            <th>시각</th>
            <th>게이트</th>
            <th>이름</th>
            <th>카드 유형</th>
            <th style="text-align: right;">기본요금</th>
            <th style="text-align: right;">조조할인</th>
            <th style="text-align: right;">적발횟수</th>
            <th style="text-align: right;">누적 과징금</th>
          </tr>
        </thead>
        <tbody id="detail-body"></tbody>
      </table>
      <p id="detail-empty" class="history-empty" style="display: none;">조건에 맞는 이력이 없습니다</p>
    </div>
  </div>

  <!-- 산정 기준 안내 -->
  <div class="card" style="margin-top: 14px;">
    <div class="card-head">
      <p class="card-title">과징금 산정 기준</p>
    </div>
    <div style="padding: 14px 18px; font-size: 13px; color: var(--kr-gray1); line-height: 1.7;" id="fare-rule-text">
      불러오는 중...
    </div>
  </div>

</div>

<script src="firebase.js"></script>
<script src="icons.js"></script>
<script src="fines.js"></script>
</body>
</html>
