<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VeriPass 카드 관리</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <div class="logo-circle">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
      </div>
      <div>
        <p class="title">VeriPass 카드 관리</p>
        <p class="subtitle">카드 마스터 정보 등록 · 수정 · 삭제</p>
      </div>
    </div>
    <div class="header-right">
      <a href="Main.html" class="nav-link">관제 대시보드</a>
      <a href="Fines.html" class="nav-link">과징금 조회</a>
      <span class="clock" id="clock"></span>
      <span class="badge badge-blue">
        <svg class="icon" viewBox="0 0 24 24"><path d="M5 12.5a11 11 0 0 1 14 0"/><path d="M8.5 16a6 6 0 0 1 7 0"/><path d="M12 19.5h.01"/></svg>
        RTDB 연결됨
      </span>
    </div>
  </div>

  <!-- 새 카드 추가 -->
  <div class="card" style="margin-bottom: 14px;">
    <div class="card-head">
      <p class="card-title">새 카드 추가</p>
      <span class="save-status" id="add-status"></span>
    </div>
    <div class="form-grid">
      <div class="form-field">
        <label for="add-id">카드 ID</label>
        <input class="kr-input" id="add-id" placeholder="비우면 자동 생성" />
      </div>
      <div class="form-field">
        <label for="add-name">이름</label>
        <input class="kr-input" id="add-name" placeholder="이름" />
      </div>
      <div class="form-field">
        <label for="add-age">나이</label>
        <input class="kr-input" id="add-age" type="number" min="0" placeholder="나이" />
      </div>
      <div class="form-field">
        <label for="add-type">카드 유형</label>
        <select class="kr-select" id="add-type" style="width:100%;">
          <option value="adult">일반</option>
          <option value="senior">경로우대</option>
          <option value="teen">청소년</option>
          <option value="disabled">장애인</option>
        </select>
      </div>
      <div class="form-field">
        <label for="add-gender">성별</label>
        <select class="kr-select" id="add-gender" style="width:100%;">
          <option value="female">여성</option>
          <option value="male">남성</option>
        </select>
      </div>
      <button class="btn btn-primary" id="add-btn">추가</button>
    </div>
  </div>

  <!-- 카드 목록 -->
  <div class="card">
    <div class="card-head">
      <p class="card-title">등록된 카드</p>
      <span class="card-meta" id="card-meta"></span>
    </div>
    <div class="history-wrap">
      <table class="history">
        <thead>
          <tr>
            <th>카드 ID</th>
            <th>이름</th>
            <th>나이</th>
            <th>카드 유형</th>
            <th>성별</th>
            <th style="text-align: right;">관리</th>
          </tr>
        </thead>
        <tbody id="cards-body"></tbody>
      </table>
      <p id="cards-empty" class="history-empty" style="display: none;">등록된 카드가 없습니다</p>
    </div>
  </div>

</div>

<!-- 카드 수정 모달 -->
<div class="modal-overlay" id="edit-overlay">
  <div class="modal-box">
    <p class="modal-heading">카드 정보 수정</p>
    <p class="modal-gate" id="edit-id-label"></p>
    <div style="display:flex; flex-direction:column; gap:12px; margin-top:6px;">
      <div class="form-field">
        <label for="edit-name">이름</label>
        <input class="kr-input" id="edit-name" />
      </div>
      <div class="form-field">
        <label for="edit-age">나이</label>
        <input class="kr-input" id="edit-age" type="number" min="0" />
      </div>
      <div class="form-field">
        <label for="edit-type">카드 유형</label>
        <select class="kr-select" id="edit-type" style="width:100%;">
          <option value="adult">일반</option>
          <option value="senior">경로우대</option>
          <option value="teen">청소년</option>
          <option value="disabled">장애인</option>
        </select>
      </div>
      <div class="form-field">
        <label for="edit-gender">성별</label>
        <select class="kr-select" id="edit-gender" style="width:100%;">
          <option value="female">여성</option>
          <option value="male">남성</option>
        </select>
      </div>
    </div>
    <span class="save-status" id="edit-status" style="display:block; margin:10px 0 0;"></span>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn btn-ghost" id="edit-cancel" style="flex:1;">취소</button>
      <button class="btn btn-primary" id="edit-save" style="flex:1;">저장</button>
    </div>
  </div>
</div>

<script src="firebase.js"></script>
<script src="icons.js"></script>
<script src="cards.js"></script>
</body>
</html>
